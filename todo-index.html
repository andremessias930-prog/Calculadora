<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1><i class="fas fa-check-circle"></i> My To-Do List</h1>
                <p>Stay organized and productive</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button class="add-btn" onclick="addTodo()">
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" onclick="filterTodos('all')">All</button>
                <button class="filter-btn" onclick="filterTodos('active')">Active</button>
                <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
            </div>

            <div class="stats-section">
                <span class="stat"><i class="fas fa-tasks"></i> Total: <span id="totalCount">0</span></span>
                <span class="stat"><i class="fas fa-circle-notch"></i> Active: <span id="activeCount">0</span></span>
                <span class="stat"><i class="fas fa-check"></i> Completed: <span id="completedCount">0</span></span>
            </div>

            <ul class="todo-list" id="todoList"></ul>

            <div class="empty-state" id="emptyState">
                <i class="fas fa-inbox"></i>
                <p>No tasks yet. Add one to get started!</p>
            </div>

            <div class="action-section">
                <button class="clear-btn" onclick="clearCompleted()">
                    <i class="fas fa-trash"></i> Clear Completed
                </button>
                <button class="clear-all-btn" onclick="clearAll()">
                    <i class="fas fa-broom"></i> Clear All
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
